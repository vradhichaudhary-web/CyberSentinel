<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Sentinel</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <h1>🛡 Cyber Sentinel Dashboard</h1>

    <div class="cards">

        <div class="card">
            <h2>Total Users</h2>
            <p id="totalUsers">0</p>
        </div>

        <div class="card">
            <h2>Total Scans</h2>
            <p id="totalScans">0</p>
        </div>

        <div class="card">
            <h2>Fake Jobs</h2>
            <p id="fakeJobs">0</p>
        </div>

        <div class="card">
            <h2>URL Scans</h2>
            <p id="urlScans">0</p>
        </div>

        <div class="card">
            <h2>High Risk</h2>
            <p id="highRisk">0</p>
        </div>

        <div class="card">
            <h2>Low Risk</h2>
            <p id="lowRisk">0</p>
        </div>

    </div>

    <script src="js/script.js"></script>

</body>
</html>
