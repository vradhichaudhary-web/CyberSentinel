<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Cyber Sentinel | Sign Up</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-5">

            <div class="card shadow">

                <div class="card-body">

                    <h3 class="text-center mb-4">
                        Create Account
                    </h3>

                    <div class="mb-3">

                        <label>Name</label>

                        <input
                                type="text"
                                id="name"
                                class="form-control">

                    </div>

                    <div class="mb-3">

                        <label>Email</label>

                        <input
                                type="email"
                                id="email"
                                class="form-control">

                    </div>

                    <div class="mb-3">

                        <label>Password</label>

                        <input
                                type="password"
                                id="password"
                                class="form-control">

                    </div>

                    <button
                            class="btn btn-primary w-100"
                            onclick="register()">

                        Register

                    </button>

                    <div
                            id="message"
                            class="mt-3 text-center">

                    </div>

                    <hr>

                    <div class="text-center">

                        <a href="login.html">

                            Already have an account? Login

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="js/signup.js"></script>

</body>
</html>
